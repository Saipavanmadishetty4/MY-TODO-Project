    <!DOCTYPE html>
    <html>
        <head>
            <title>Todo List</title>
            <style>
                body {
                    font-family: Arial, sans-serif;
                    max-width: 500px;
                    margin: 40px auto;
                }

                .todo-item {
                    display: flex;
                    justify-content: space-between;
                    padding: 10px;
                    margin: 5px 0;
                    background:     #f0f0f0;
                    border-radius: 5px;
                }

                .completed {
                    text-decoration: line-through;
                    color: gray;
                }

                button {
                    cursor: pointer;
                    padding: 8px 6px;
                    background: #4CAF50;
                    color: white;
                    border: none;
                    border-radius: 4px;
                }

                .completed-btn {
                    background: #2196F3;
                    padding: 4px 8px;
                }

                .delete-btn {
                    background: #f44336;
                    padding: 4px 8px;
                }

                input {
                    padding: 8px;
                    width: 70%;
                    border: 1px solid #ccc;
                    border-radius: 4px;
                }
                .completed {
                text-decoration: line-through;
                color: gray;
                }
            </style>
        </head>
        <body>
            <h1>My Todo List</h1>

            <!-- Input area -->
            <div>
                <input type="text" id="todoInput" placeholder="Enter a todo..."/>
                <button id="addBtn">Add</button>
            </div>

            <!-- Todos will appear here -->
            <div id="todoList"></div>

            <!-- Summary -->
            <p id="summary">Total: 0 | Completed: 0 | Remaining: 0</p>

            <script type = "module" src="app.js"></script>
        </body>
    </html>
